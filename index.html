<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Dropdown</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS (IMPORTANT for dropdown) -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #f4f6f9;
      padding: 40px;
      text-align: center;
    }
    h4 {
      margin-top: 30px;
    }
    .box {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2>Bootstrap Dropdown - All Types</h2>

<!-- 1. Basic Dropdown -->
<h4>Basic</h4>
<div class="dropdown box">
  <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
    Dropdown
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="#">Item 1</a>
    <a class="dropdown-item" href="#">Item 2</a>
    <a class="dropdown-item" href="#">Item 3</a>
  </div>
</div>

<!-- 2. Divider -->
<h4>With Divider</h4>
<div class="dropdown box">
  <button class="btn btn-success dropdown-toggle" data-toggle="dropdown">
    Menu
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="#">Option 1</a>
    <div class="dropdown-divider"></div>
    <a class="dropdown-item" href="#">Option 2</a>
  </div>
</div>

<!-- 3. Header -->
<h4>With Header</h4>
<div class="dropdown box">
  <button class="btn btn-info dropdown-toggle" data-toggle="dropdown">
    Header Menu
  </button>
  <div class="dropdown-menu">
    <h6 class="dropdown-header">Category</h6>
    <a class="dropdown-item" href="#">Item A</a>
    <a class="dropdown-item" href="#">Item B</a>
  </div>
</div>

<!-- 4. Active & Disabled -->
<h4>Active & Disabled</h4>
<div class="dropdown box">
  <button class="btn btn-warning dropdown-toggle" data-toggle="dropdown">
    Status
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item active" href="#">Active</a>
    <a class="dropdown-item disabled" href="#">Disabled</a>
  </div>
</div>

<!-- 5. Dropdown Sizes -->
<h4>Sizes</h4>
<div class="dropdown box">
  <button class="btn btn-lg btn-primary dropdown-toggle" data-toggle="dropdown">
    Large
  </button>
  <button class="btn btn-sm btn-secondary dropdown-toggle" data-toggle="dropdown">
    Small
  </button>
</div>

<!-- 6. Drop Directions -->
<h4>Drop Directions</h4>

<div class="btn-group dropup box">
  <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
    Dropup
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="#">Item</a>
  </div>
</div>

<div class="btn-group dropright box">
  <button class="btn btn-success dropdown-toggle" data-toggle="dropdown">
    Right
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="#">Item</a>
  </div>
</div>

<div class="btn-group dropleft box">
  <button class="btn btn-danger dropdown-toggle" data-toggle="dropdown">
    Left
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="#">Item</a>
  </div>
</div>

</body>
</html>
